<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="calc.css">

    <title>Calculadora</title>
  </head>
  <body>
    <div class="container">
        <h1>Calculadora</h1>
        <div class="row" style="margin-left: 23px;">
            <input type="text" class="form-control" id="res" disabled="disabled" placeholder="0">
        </div>
        <div class="row" style="margin-left: 21px;">
            <button onclick="calcular('acao','c')" class="btn btn-dark clear">C</button>
            <button onclick="calcular('acao','/')" class="btn btn-dark">/</button>
            <button onclick="calcular('acao','*')" class="btn btn-dark">X</button>
        </div>
        <div class="row" style="margin-left: 21px;">
            <button onclick="calcular('valor',7)" class="btn btn-dark">7</button>
            <button onclick="calcular('valor',8)" class="btn btn-dark">8</button>
            <button onclick="calcular('valor',9)" class="btn btn-dark">9</button>
            <button onclick="calcular('acao','-')" class="btn btn-dark">-</button>
        </div>
        <div class="row" style="margin-left: 21px;">
            <button onclick="calcular('valor',4)" class="btn btn-dark">4</button>
            <button onclick="calcular('valor',5)" class="btn btn-dark">5</button>
            <button onclick="calcular('valor',6)" class="btn btn-dark">6</button>
            <button onclick="calcular('acao','+')" class="btn btn-dark">+</button>
        </div>
        <div class="row" style="margin-left: 21px;">
            <button onclick="calcular('valor',1)" class="btn btn-dark">1</button>
            <button onclick="calcular('valor',2)" class="btn btn-dark">2</button>
            <button onclick="calcular('valor',3)" class="btn btn-dark">3</button>
            <button onclick="calcular('acao','=')" class="btn btn-dark igual">=</button>
        </div>
        <div class="row" style="margin-left: 21px;" id="alinhar">
            <button onclick="calcular('valor',0)" class="btn btn-dark zero">0</button>
            <button onclick="calcular('acao','.')" class="btn btn-dark">.</button>
            
        </div>
    </div>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="calc.js"></script>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
  </body>
</html>
